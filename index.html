    <!-- Boot script (hash-allowlisted in the CSP above — update the sha256 if
         you change a single character). Runs before first paint: applies the
         saved dark theme, and hides the prerendered landing page when it isn't
         the content about to be rendered (signed-in user or a deep link), so
         refreshes don't flash the landing snapshot. main.jsx removes .booting
         once the real app has rendered. -->
    <script>(function(){try{var d=document.documentElement;if(localStorage.getItem('tunebox_theme')==='dark')d.classList.add('dark');if(location.pathname!=='/'||localStorage.getItem('pocketbase_auth'))d.classList.add('booting')}catch(e){}})()</script>
    <style>.booting #app{display:none}html.dark{background:#101828}</style>
